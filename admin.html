<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>管理员面板</title>
  <link rel="stylesheet" href="styles.css">
  <script src="auth.js"></script>
</head>
<body>
  <script> // protect page
    if(window.requireAdmin) window.requireAdmin();
  </script>
  <main class="container admin-shell">
    <section class="admin-box">
      <div class="admin-topbar">
        <div class="admin-title-wrap">
          <a href="index.html" class="back-button" aria-label="Back to home">&#60;</a>
          <div>
            <p class="section-kicker">Admin console</p>
            <h1>Administrator panel</h1>
          </div>
        </div>
        <div class="admin-actions">
          <button class="button" onclick="exportUsersFile()">Export users</button>
          <button class="button ghost" onclick="logout()">Logout</button>
        </div>
      </div>

      <section class="admin-section">
        <h3>Protected content passwords</h3>
        <div class="admin-grid">
          <label>Magazine password<input id="magazinePasswordValue"></label>
          <label>Audio password<input id="audioPasswordValue"></label>
        </div>
        <div class="admin-actions" style="margin-top:10px;">
          <button class="button small" onclick="saveProtectedPasswords()">Save passwords</button>
        </div>
      </section>

      <section class="admin-section">
        <h3>Upload files (max 23MB)</h3>
        <div class="admin-grid">
          <label>Magazine file<input type="file" id="magazineFileInput"></label>
          <label>Audio file<input type="file" id="audioFileInput"></label>
        </div>
        <div class="admin-actions" style="margin-top:10px;">
          <button class="button small" onclick="uploadProtectedFile('magazine')">Upload to magazine</button>
          <button class="button small ghost" onclick="uploadProtectedFile('audio')">Upload to audio</button>
        </div>
        <div class="admin-grid" style="margin-top:12px;">
          <div>
            <h4>Magazine files</h4>
            <div id="magazineFiles"></div>
          </div>
          <div>
            <h4>Audio files</h4>
            <div id="audioFiles"></div>
          </div>
        </div>
      </section>

      <section class="admin-section">
        <h3>Users</h3>
        <div id="usersList"></div>
      </section>

      <section class="admin-section">
        <div class="admin-section-head">
          <h3>Access history</h3>
          <button class="button ghost small" onclick="clearAuthLogs(); renderLogs()">Clear logs</button>
        </div>
        <div id="logs"></div>
      </section>
    </section>
  </main>

  <script>
    function renderProtectedSettings(){
      document.getElementById('magazinePasswordValue').value = getProtectedPassword('magazine');
      document.getElementById('audioPasswordValue').value = getProtectedPassword('audio');
      renderProtectedAssets('magazine', 'magazineFiles');
      renderProtectedAssets('audio', 'audioFiles');
    }

    async function saveProtectedPasswords(){
      setProtectedPassword('magazine', document.getElementById('magazinePasswordValue').value);
      setProtectedPassword('audio', document.getElementById('audioPasswordValue').value);
      alert('Passwords saved');
    }

    async function uploadProtectedFile(page){
      const input = document.getElementById(page === 'magazine' ? 'magazineFileInput' : 'audioFileInput');
      const file = input.files[0];
      if(!file){ alert('Please choose a file'); return; }
      try{
        await addProtectedFile(page, file);
        input.value = '';
        renderProtectedAssets(page, page === 'magazine' ? 'magazineFiles' : 'audioFiles');
      } catch(err){ alert(err.message || 'Upload failed'); }
    }

    async function renderProtectedAssets(page, targetId){
      const container = document.getElementById(targetId);
      const files = await getProtectedFiles(page);
      if(!files.length){ container.innerHTML = '<p class="muted">No files yet.</p>'; return; }
      container.innerHTML = files.map(f => `<div class="file-entry">${f.name} <span class="file-meta">(${Math.round(f.size/1024/1024)}MB)</span> <button class="button ghost small" onclick="deleteProtectedFile('${f.id}').then(()=>renderProtectedAssets('${page}','${targetId}'))">Delete</button></div>`).join('');
    }

    function renderUsers(){
      const users = adminListUsers();
      const container = document.getElementById('usersList');
      container.innerHTML = '';
      const table = document.createElement('table');
      table.className = 'admin-table';
      table.innerHTML = '<tr><th>Username</th><th>Password</th><th>Admin</th><th>Actions</th></tr>';
      for(const u of users){
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${u.username}</td><td><input value="${u.password}" data-username="${u.username}" class="pw"></td><td>${u.isAdmin? 'Yes':'No'}</td><td><button class='button small' data-username='${u.username}'>Save</button> <button class='button ghost small' data-del='${u.username}'>Delete</button></td>`;
        table.appendChild(tr);
      }
      container.appendChild(table);
      container.querySelectorAll('button[data-username]').forEach(b=>b.addEventListener('click', ()=>{
        const un = b.getAttribute('data-username');
        const pw = container.querySelector(`input[data-username="${un}"]`).value;
        adminUpdateUser(un, {password: pw});
        renderUsers();
      }));
      container.querySelectorAll('button[data-del]').forEach(b=>b.addEventListener('click', ()=>{
        const u = b.getAttribute('data-del'); if(u==='thanatoszhang'){ alert('不能删除管理员'); return; }
        if(confirm('确认删除用户 '+u+' ?')){ adminDeleteUser(u); renderUsers(); }
      }));
    }

    function renderLogs(){
      const logs = getAuthLogs();
      const c = document.getElementById('logs');
      if(!logs.length) { c.innerHTML = '<p class="muted">暂无记录</p>'; return; }
      c.innerHTML = logs.map(l=> `<div class="log">${l.when} — ${l.type} — ${l.username} — ${l.ip} ${l.city||''} ${l.region||''} ${l.country||''}</div>`).join('');
    }

    renderProtectedSettings();
    renderUsers(); renderLogs();
  </script>
</body>
</html>
