<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>管理员面板</title>
  <link rel="stylesheet" href="styles.css">
  <script src="auth.js"></script>
</head>
<body>
  <script> // protect page
    if(window.requireAdmin) window.requireAdmin();
  </script>
  <main class="container admin-box">
    <h1>管理员面板</h1>
    <div style="margin-bottom:12px"><button class="button" onclick="exportUsersFile()">导出用户文件</button> <button class="button ghost" onclick="logout()">登出</button></div>
    <section>
      <h3>用户列表</h3>
      <div id="usersList"></div>
    </section>
    <section style="margin-top:18px">
      <h3>登录/注册记录</h3>
      <div id="logs"></div>
      <button class="button ghost" onclick="clearAuthLogs(); renderLogs()">清空记录</button>
    </section>
  </main>

  <script>
    function renderUsers(){
      const users = adminListUsers();
      const container = document.getElementById('usersList');
      container.innerHTML = '';
      const table = document.createElement('table');
      table.className = 'admin-table';
      table.innerHTML = '<tr><th>用户名</th><th>密码</th><th>管理员</th><th>操作</th></tr>';
      for(const u of users){
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${u.username}</td><td><input value="${u.password}" data-username="${u.username}" class="pw"></td><td>${u.isAdmin? 'Yes':'No'}</td><td><button class='button' data-username='${u.username}'>保存</button> <button class='button ghost' data-del='${u.username}'>删除</button></td>`;
        table.appendChild(tr);
      }
      container.appendChild(table);
      container.querySelectorAll('button[data-username]').forEach(b=>b.addEventListener('click', ()=>{
        const un = b.getAttribute('data-username');
        const pw = container.querySelector(`input[data-username="${un}"]`).value;
        adminUpdateUser(un, {password: pw});
        renderUsers();
      }));
      container.querySelectorAll('button[data-del]').forEach(b=>b.addEventListener('click', ()=>{
        const u = b.getAttribute('data-del'); if(u==='thanatoszhang'){ alert('不能删除管理员'); return; }
        if(confirm('确认删除用户 '+u+' ?')){ adminDeleteUser(u); renderUsers(); }
      }));
    }

    function renderLogs(){
      const logs = getAuthLogs();
      const c = document.getElementById('logs');
      if(!logs.length) { c.innerHTML = '<p class="muted">暂无记录</p>'; return; }
      c.innerHTML = logs.map(l=> `<div class="log">${l.when} — ${l.type} — ${l.username} — ${l.ip} ${l.city||''} ${l.region||''} ${l.country||''}</div>`).join('');
    }

    renderUsers(); renderLogs();
  </script>
</body>
</html>
