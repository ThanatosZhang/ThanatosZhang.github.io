<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>登录 - 个人博客</title>
  <link rel="stylesheet" href="styles.css">
  <script src="auth.js"></script>
</head>
<body>
  <main class="container auth-shell">
    <section class="auth-card">
      <div class="auth-intro">
        <p class="section-kicker">Secure access</p>
        <h2>Welcome back</h2>
        <p>Sign in to continue exploring the protected content and personalized experience.</p>
      </div>
      <form id="loginForm" class="auth-form">
        <label>Username<input id="username" required></label>
        <label>Password<input id="password" type="password" required></label>
        <div class="auth-actions">
          <button type="submit" class="button">Sign in</button>
          <a href="register.html" class="button ghost">Create account</a>
        </div>
      </form>
      <div id="msg" class="muted"></div>
    </section>
  </main>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e){
      e.preventDefault();
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const r = await loginUser(u,p);
      const msg = document.getElementById('msg');
      if(r.ok){
        msg.textContent = '登录成功，跳转中...';
        setTimeout(()=>{
          if(u==='thanatoszhang') location.href='admin.html'; else location.href='index.html';
        },700);
      } else {
        msg.textContent = r.msg || '登录失败';
      }
    });
  </script>
</body>
</html>
