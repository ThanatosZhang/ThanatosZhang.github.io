<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>登录 - 个人博客</title>
  <link rel="stylesheet" href="styles.css">
  <script src="auth.js"></script>
</head>
<body>
  <main class="container auth-box">
    <h2>Login</h2>
    <form id="loginForm">
      <label>用户名<br><input id="username" required></label>
      <label>密码<br><input id="password" type="password" required></label>
      <div style="margin-top:12px;"><button type="submit" class="button">登录</button>
      <a href="register.html" class="button ghost">注册</a></div>
    </form>
    <div id="msg" class="muted"></div>
  </main>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e){
      e.preventDefault();
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const r = await loginUser(u,p);
      const msg = document.getElementById('msg');
      if(r.ok){
        msg.textContent = '登录成功，跳转中...';
        setTimeout(()=>{
          if(u==='thanatoszhang') location.href='admin.html'; else location.href='index.html';
        },700);
      } else {
        msg.textContent = r.msg || '登录失败';
      }
    });
  </script>
</body>
</html>
