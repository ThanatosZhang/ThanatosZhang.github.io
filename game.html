<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click the Ball Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400&family=Merriweather:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f7f9fc 0%, #eef4fb 100%);
            color: #334155;
            padding: 24px 16px 40px;
        }
        .game-shell {
            width: min(1100px, 100%);
            background: rgba(255,255,255,0.86);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.7);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
            padding: 28px;
        }
        #title {
            font-size: 36px;
            font-weight: 700;
            margin: 4px 0 18px;
            color: #5b8db8;
            text-align: center;
            font-family: 'Merriweather', serif;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 18px;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 1000px;
            height: 600px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
            border: 1px solid rgba(148, 163, 184, 0.25);
            margin-top: 20px;
            box-shadow: inset 0 1px 2px rgba(148,163,184,0.2);
            border-radius: 24px;
            overflow: hidden;
        }
        .ball {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s ease;
            cursor: default;
        }
        #controls {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            flex-wrap: wrap;
            gap: 10px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            background: rgba(248,250,252,0.95);
            padding: 10px 12px;
            border-radius: 999px;
            border: 1px solid rgba(226,232,240,0.95);
        }
        #startButton, #stopButton {
            padding: 10px 18px;
            font-size: 16px;
            cursor: pointer;
            background: linear-gradient(135deg, #5b8db8, #7aa9cf);
            color: #fff;
            border: none;
            border-radius: 999px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin: 10px 0;
            box-shadow: 0 10px 24px rgba(91, 141, 184, 0.2);
        }
        #startButton:hover, #stopButton:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 26px rgba(60, 110, 145, 0.24);
        }
        #sizeInput, #colorInput, #countInput {
            padding: 8px 10px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 999px;
            font-size: 15px;
            background: white;
        }
        #stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            width: 100%;
            font-size: 18px;
            background: rgba(241,245,249,0.9);
            padding: 14px 12px;
            border-radius: 18px;
            box-shadow: inset 0 1px 2px rgba(148,163,184,0.15);
            flex-wrap: wrap;
            gap: 8px;
        }
        #stats div {
            text-align: center;
            flex: 1;
            margin: 5px 0;
            color: #475569;
        }
        #highScore {
            margin-top: 20px;
            font-size: 22px;
            color: #5b8db8;
            font-weight: 700;
            text-align: center;
        }
        #footer {
            margin-top: 24px;
            font-size: 15px;
            color: #64748b;
            text-align: center;
            width: 100%;
            line-height: 1.7;
        }
        #footer a {
            color: #5b8db8;
            text-decoration: none;
        }
        #footer a:hover {
            color: #3c6e91;
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            .game-shell { padding: 18px; }
            #title { font-size: 28px; }
            #gameContainer { height: 500px; }
            #controls { flex-direction: column; align-items: stretch; }
            .control-group { border-radius: 16px; justify-content: center; }
            #startButton, #stopButton { width: 100%; }
            #sizeInput, #colorInput, #countInput { width: 100%; }
            #stats { flex-direction: column; }
            #highScore { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="game-shell">
        <div id="title">🎯 Click the Ball Game</div>
        <div class="subtitle">A calm, polished little challenge built into your personal site.</div>
        <div id="controls">
           <div class="control-group"><label for="sizeInput">⚙️ Ball Size (10-100px):</label><input type="number" id="sizeInput" min="10" max="100" value="30"></div>
           <div class="control-group"><label for="countInput">🎯 Ball Count (1-10):</label><input type="number" id="countInput" min="1" max="10" value="1"></div>
           <div class="control-group"><label for="colorInput">🎨 Ball Color:</label><input type="color" id="colorInput" value="#ff6347"></div>
            <button id="startButton">🚀 Start Game</button>
            <button id="stopButton" style="display: none;">🛑 Stop Game</button>
        </div>
        <div id="stats">
            <div>⏳ Time Left: <span id="timer">30</span> seconds</div>
            <div>🏆 Score: <span id="score">0</span></div>
            <div>🎯 Accuracy: <span id="accuracy">0</span>%</div>
        </div>
        <div id="gameContainer"></div>
        <div id="highScore">🥇 High Score: <span id="highScoreValue">0</span></div>
        <div id="footer">
            Game repository: <a href="https://github.com/liaoyanqing666/liaoyanqing666.github.io" target="_blank">https://github.com/liaoyanqing666/liaoyanqing666.github.io</a><br>
            Game author: <a href="https://siyuanli.tech" target="_blank">Siyuan Li</a>
        </div>
    </div>
    <script>
        // Require login to access this page
        (function(){
            var s = document.createElement('script');
            s.src = 'auth.js';
            s.onload = function(){ if(window.requireAuth) window.requireAuth(); };
            document.head.appendChild(s);
        })();

        const gameContainer = document.getElementById("gameContainer");
        const scoreDisplay = document.getElementById("score");
        const timerDisplay = document.getElementById("timer");
        const accuracyDisplay = document.getElementById("accuracy");
        const highScoreDisplay = document.getElementById("highScoreValue");
        const startButton = document.getElementById("startButton");
        const stopButton = document.getElementById("stopButton");
        const sizeInput = document.getElementById("sizeInput");
        const colorInput = document.getElementById("colorInput");
        const countInput = document.getElementById("countInput");
        let score = 0;
        let totalClicks = 0;
        let timeLeft = 30;
        let isGameStarted = false;
        let ballSize = 30;
        let ballColor = "#ff6347";
        let highScore = 0;

        function checkCollision(x, y, size) {
            const balls = gameContainer.getElementsByClassName("ball");
            for (const ball of balls) {
                const ballX = parseInt(ball.style.left);
                const ballY = parseInt(ball.style.top);
                const dx = x - ballX;
                const dy = y - ballY;
                if (dx * dx + dy * dy < size * size) return true;
            }
            return false;
        }

        function createBall() {
            const ball = document.createElement("div");
            ball.classList.add("ball");
            const maxX = gameContainer.clientWidth - ballSize;
            const maxY = gameContainer.clientHeight - ballSize;
            
            let randomX, randomY;
            do {
                randomX = Math.floor(Math.random() * maxX);
                randomY = Math.floor(Math.random() * maxY);
            } while (checkCollision(randomX, randomY, ballSize));
            
            ball.style.width = ballSize + "px";
            ball.style.height = ballSize + "px";
            ball.style.backgroundColor = ballColor;
            ball.style.left = randomX + "px";
            ball.style.top = randomY + "px";
            ball.addEventListener("click", () => {
                ball.remove();
                score++;
                totalClicks++;
                updateScore();
                updateAccuracy();
                createBall();
            });
            gameContainer.appendChild(ball);
        }

        function updateScore() { scoreDisplay.textContent = score; }
        function updateAccuracy() { 
            accuracyDisplay.textContent = Math.floor((totalClicks ? score / totalClicks : 0) * 100); 
        }

        startButton.addEventListener("click", () => {
            if (!isGameStarted) {
                isGameStarted = true;
                score = 0;
                totalClicks = 0;
                timeLeft = 30;
                ballSize = parseInt(sizeInput.value);
                ballColor = colorInput.value;
                ballCount = parseInt(countInput.value);
                
                gameContainer.innerHTML = "";
                for (let i = 0; i < ballCount; i++) createBall();
                
                timerInterval = setInterval(updateTimer, 1000);
                startButton.style.display = "none";
                stopButton.style.display = "block";
            }
        });

        stopButton.addEventListener("click", () => {
            if (isGameStarted) {
                endGame();
            }
        });

        gameContainer.addEventListener("click", (event) => {
            if (isGameStarted && !event.target.classList.contains("ball")) {
                totalClicks++;
                updateAccuracy();
            }
        });

        function updateTimer() {
            timeLeft--;
            timerDisplay.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                endGame();
            }
        }

        function endGame() {
            clearInterval(timerInterval);
            isGameStarted = false;
            startButton.style.display = "block";
            stopButton.style.display = "none";
            gameContainer.innerHTML = "";
            if (score > highScore) {
                highScore = score;
                highScoreDisplay.textContent = highScore;
                alert(`🎉 New High Score! Score: ${score}`);
            } else {
                alert(`🎉 Game Over! Score: ${score}`);
            }
        }
    </script>
</body>
</html>
