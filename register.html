<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>注册 - 个人博客</title>
  <link rel="stylesheet" href="styles.css">
  <script src="auth.js"></script>
</head>
<body>
  <main class="container auth-box">
    <h2>Register</h2>
    <form id="registerForm">
      <label>用户名<br><input id="username" required></label>
      <label>密码<br><input id="password" type="password" required></label>
      <div style="margin-top:12px;"><button type="submit" class="button">注册</button>
      <a href="login.html" class="button ghost">已有账号，去登录</a></div>
    </form>
    <div id="msg" class="muted"></div>
  </main>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async function(e){
      e.preventDefault();
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const r = await registerUser(u,p);
      const msg = document.getElementById('msg');
      if(r.ok){
        msg.textContent = '注册成功，已跳转到欢迎页面';
        setTimeout(()=> location.href='welcome.html', 900);
      } else {
        msg.textContent = r.msg || '注册失败';
      }
    });
  </script>
</body>
</html>
