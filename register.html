<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>注册 - 个人博客</title>
  <link rel="stylesheet" href="styles.css">
  <script src="auth.js"></script>
</head>
<body>
  <main class="container auth-shell">
    <section class="auth-card">
      <div class="auth-intro">
        <p class="section-kicker">Create account</p>
        <h2>Join the experience</h2>
        <p>Create a username and password to unlock the protected content.</p>
      </div>
      <form id="registerForm" class="auth-form">
        <label>Username<input id="username" required></label>
        <label>Password<input id="password" type="password" required></label>
        <div class="auth-actions">
          <button type="submit" class="button">Create account</button>
          <a href="login.html" class="button ghost">Already have one?</a>
        </div>
      </form>
      <div id="msg" class="muted"></div>
    </section>
  </main>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async function(e){
      e.preventDefault();
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const r = await registerUser(u,p);
      const msg = document.getElementById('msg');
      if(r.ok){
        msg.textContent = '注册成功，已跳转到欢迎页面';
        setTimeout(()=> location.href='welcome.html', 900);
      } else {
        msg.textContent = r.msg || '注册失败';
      }
    });
  </script>
</body>
</html>
