<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oops! 404 Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400&family=Merriweather:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f7f9fc 0%, #eef4fb 100%);
            color: #334155;
            text-align: center;
            padding: 50px 20px;
            min-height: 100vh;
            display: grid;
            place-items: center;
        }
        .card {
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
            border-radius: 24px;
            padding: 42px 32px;
            max-width: 560px;
            backdrop-filter: blur(18px);
        }
        h1 {
            font-size: 3.4rem;
            margin-bottom: 16px;
            color: #5b8db8;
            font-family: 'Merriweather', serif;
        }
        p {
            font-size: 1rem;
            margin-bottom: 14px;
        }
        a {
            color: #fff;
            text-decoration: none;
            font-size: 0.95rem;
            background: linear-gradient(135deg, #5b8db8, #7aa9cf);
            padding: 10px 18px;
            border-radius: 999px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: inline-block;
            margin: 8px 6px;
            box-shadow: 0 10px 24px rgba(91, 141, 184, 0.2);
        }
        a:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 26px rgba(60, 110, 145, 0.24);
            text-decoration: none;
        }
        .emoji {
            font-size: 5rem;
            margin-bottom: 18px;
            animation: float 3s infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">🤔</div>
        <h1>Oops! 404</h1>
        <p>It seems you've wandered off the map... This page doesn't exist.</p>
        <p>No worries! Let's get you back on track:</p>
        <p><a href="/">Take me home!</a></p>
        <p>Or, you can play a fun game while you're here:</p>
        <p><a href="game.html">Play the game!</a></p>
    </div>
</body>
</html>
